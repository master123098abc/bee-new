// ─── IELTS BAND CONVERSION TABLES ────────────────────────────────────────────
// Official IELTS raw→band for 40-question tests, scaled to 10
function rawToListeningBand(correct) {
  // official IELTS Listening band scale (out of 40, scaled to 10 here)
  const scale = [0,1,1,1,1,1,1.5,2,2,2.5,2.5,3,3,3.5,3.5,4,4,4.5,4.5,5,5,5.5,5.5,6,6,6.5,6.5,7,7,7,7.5,7.5,8,8,8,8.5,8.5,8.5,9,9,9];
  return scale[Math.min(correct, 40)] || 0;
}
function rawToReadingBand(correct) {
  const scale = [0,1,1,1,1,1,1.5,2,2,2.5,2.5,3,3,3.5,3.5,4,4,4.5,4.5,5,5,5.5,5.5,6,6,6.5,6.5,7,7,7,7.5,7.5,8,8,8,8.5,8.5,8.5,9,9,9];
  return scale[Math.min(correct, 40)] || 0;
}

// Band descriptor map
const BAND_DESCRIPTORS = {
  9: "Expert User", 8.5: "Expert User", 8: "Very Good User",
  7.5: "Good User", 7: "Good User", 6.5: "Competent User",
  6: "Competent User", 5.5: "Modest User", 5: "Modest User",
  4.5: "Limited User", 4: "Limited User", 3.5: "Extremely Limited",
  3: "Extremely Limited", 2.5: "Intermittent User", 2: "Intermittent User",
  1.5: "Non User", 1: "Non User", 0: "Did Not Attempt"
};

function getBandDescriptor(band) {
  const b = Math.round(parseFloat(band) * 2) / 2;
  return BAND_DESCRIPTORS[b] || "Limited User";
}

function roundToHalf(n) {
  return Math.round(n * 2) / 2;
}

// ─── TTS HOOK ────────────────────────────────────────────────────────────────
function useTTS() {
  const [speaking, setSpeaking] = useState(false);
  const [supported] = useState(() => typeof window !== "undefined" && "speechSynthesis" in window);
  const utterRef = useRef(null);

  const speak = useCallback((text, rate = 0.92) => {
    if (!supported) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate;
    u.pitch = 1;
    u.lang = "en-GB";
    // prefer a British voice if available
    const voices = window.speechSynthesis.getVoices();
    const british = voices.find(v => v.lang === "en-GB") || voices.find(v => v.lang.startsWith("en")) || null;
    if (british) u.voice = british;
    u.onstart = () => setSpeaking(true);
    u.onend = () => setSpeaking(false);
    u.onerror = () => setSpeaking(false);
    utterRef.current = u;
    window.speechSynthesis.speak(u);
  }, [supported]);

  const stop = useCallback(() => {
    if (!supported) return;
    window.speechSynthesis.cancel();
    setSpeaking(false);
  }, [supported]);

  return { speak, stop, speaking, supported };
}

// ─── SPEECH RECOGNITION HOOK ─────────────────────────────────────────────────
function useSpeechRecognition() {
  const [supported] = useState(() => typeof window !== "undefined" && ("SpeechRecognition" in window || "webkitSpeechRecognition" in window));
  const recRef = useRef(null);

  const startRecognition = useCallback((onResult, onEnd) => {
    if (!supported) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = "en-US";
    rec.interimResults = true;
    rec.continuous = true;
    rec.onresult = (e) => {
      let transcript = "";
      for (let i = 0; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      onResult(transcript);
    };
    rec.onend = () => { onEnd && onEnd(); };
    rec.onerror = () => { onEnd && onEnd(); };
    recRef.current = rec;
    rec.start();
  }, [supported]);

  const stopRecognition = useCallback(() => {
    if (recRef.current) { try { recRef.current.stop(); } catch(e) {} }
  }, []);

  return { startRecognition, stopRecognition, supported };
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(s) {
  return `${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
}
function countWords(str) { return str.trim().split(/\s+/).filter(Boolean).length; }

// ─── AI SCORING via Anthropic API ───────────────────────────────────────────
async function scoreWithAI(section, content) {
  const prompts = {
    writing: `You are a certified IELTS examiner. Score the following IELTS Writing responses strictly according to the official IELTS Writing Band Descriptors (Task Achievement/Response, Coherence & Cohesion, Lexical Resource, Grammatical Range & Accuracy). 

Task 1 response: """${content.task1}"""
Task 2 response: """${content.task2}"""

Return ONLY valid JSON in this exact format, no markdown, no extra text:
{"task1_band": <number 0-9, increments of 0.5>, "task2_band": <number 0-9, increments of 0.5>, "overall_band": <number 0-9, increments of 0.5>, "task1_feedback": "<2-3 sentence feedback>", "task2_feedback": "<2-3 sentence feedback>", "strengths": "<one strength>", "improvements": "<one key improvement>"}`,

    speaking: `You are a certified IELTS examiner. Score the following IELTS Speaking transcripts strictly according to the official IELTS Speaking Band Descriptors (Fluency & Coherence, Lexical Resource, Grammatical Range & Accuracy, Pronunciation).

Part 1 responses: """${content.part1}"""
Part 2 response: """${content.part2}"""
Part 3 responses: """${content.part3}"""

Return ONLY valid JSON in this exact format, no markdown, no extra text:
{"band": <number 0-9, increments of 0.5>, "fluency_band": <number 0-9>, "lexical_band": <number 0-9>, "grammar_band": <number 0-9>, "feedback": "<3-4 sentence overall feedback>", "strengths": "<one strength>", "improvements": "<one key improvement>"}`
  };

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompts[section] }]
    })
  });
  const data = await resp.json();
  const text = data.content?.map(b => b.text || "").join("") || "";
  try {
    return JSON.parse(text.replace(/```json|```/g, "").trim());
  } catch(e) {
    return null;
  }
}

function Timer({ seconds }) {
  const cls = seconds < 60 ? "danger" : seconds < 300 ? "warning" : "";
  return (
    <div className="timer-block">
      <div className="timer-label">Time Left</div>
      <div className={`timer-value ${cls}`}>{fmt(seconds)}</div>
    </div>
  );
}

function QuestionBlock({ q, answered, onAnswer, submitted }) {
  if (q.type === "mcq") {
    return (
      <div className="question">
        <div className="q-text"><span className="q-num">{q.num}.</span>{q.text}</div>
        <div className="options">
          {q.options.map((opt, i) => {
            let cls = "";
            if (submitted) { if (i === q.answer) cls = "correct"; else if (answered === i) cls = "incorrect"; }
            else if (answered === i) cls = "selected";
            return (
              <div key={i} className={`option ${cls}`} onClick={() => !submitted && onAnswer(q.id, i)}>
                <span className="option-letter">{String.fromCharCode(65+i)}</span>{opt}
              </div>
            );
          })}
        </div>
      </div>
    );
  }
  if (q.type === "fill") {
    let iCls = "";
    if (submitted) {
      iCls = (answered||"").toLowerCase().trim() === q.answer.toLowerCase() ? "correct" : "incorrect";
    }
    return (
      <div className="question">
        <div className="q-text"><span className="q-num">{q.num}.</span>{q.text}</div>
        <input className={`fill-input ${iCls}`} value={answered||""} onChange={e => !submitted && onAnswer(q.id, e.target.value)} placeholder="Your answer…" disabled={submitted} />
      </div>
    );
  }
  return null;
}

function SpeakingSection({ transcripts, onTranscript, submitted, onSubmit, timerSec }) {
  const { speak, stop, speaking } = useTTS();
  const { startRecognition, stopRecognition, supported: srSupported } = useSpeechRecognition();
  const [recording, setRecording] = useState({});
  const [liveText, setLiveText] = useState({});

  const toggleRecord = (key, prompt) => {
    if (recording[key]) {
      stopRecognition();
      setRecording(r => ({...r, [key]: false}));
    } else {
      if (speaking) stop();
      setRecording(r => ({...r, [key]: true}));
      const prev = transcripts[key] || "";
      startRecognition(
        (text) => { setLiveText(t => ({...t, [key]: text})); onTranscript(key, prev + " " + text); },
        () => setRecording(r => ({...r, [key]: false}))
      );
    }
  };

  return (
    <div className="section-panel">
      <div className="section-header">
        <div>
          <div className="section-title">Speaking Test</div>

                    <button className="read-q-btn" onClick={() => speaking ? stop() : speak(q, 0.88)}>
                      🔊 {speaking ? "Stop" : "Read Question"}
                    </button>
                    {srSupported ? (
                      <button className={`rec-btn ${recording[key] ? "active" : ""}`} onClick={() => !submitted && toggleRecord(key, q)}>

                  )}

// ─── RESULTS ─────────────────────────────────────────────────────────────────
function Results({ lAnswers, rAnswers, wAnswers, sTranscripts, onRetake }) {
  const [wScore, setWScore] = useState(null);
  const [sScore, setSScore] = useState(null);
  const [loading, setLoading] = useState({ w: false, s: false });
  const [fetched, setFetched] = useState({ w: false, s: false });

  // Listening score
  const lQ = LISTENING.qGroups.flatMap(g => g.questions);
  let lCorrect = 0;
  lQ.forEach(q => {
    if (q.type==="mcq" && lAnswers[q.id]===q.answer) lCorrect++;
    if (q.type==="fill" && (lAnswers[q.id]||"").toLowerCase().trim()===q.answer.toLowerCase()) lCorrect++;
  });
  // Scale 10 questions → 40 question band table
  const lScaled = Math.round(lCorrect / lQ.length * 40);
  const lBand = rawToListeningBand(lScaled);

  // Reading score
  const rQ = READING.qGroups.flatMap(g => g.questions);
  let rCorrect = 0;
  rQ.forEach(q => { if (rAnswers[q.id]===q.answer) rCorrect++; });
  const rScaled = Math.round(rCorrect / rQ.length * 40);
  const rBand = rawToReadingBand(rScaled);

  // Fetch AI scores on mount
  useEffect(() => {
    // Writing
    const w1 = wAnswers["w1"] || "(no response)";
    const w2 = wAnswers["w2"] || "(no response)";
    if (!fetched.w) {
      setFetched(f => ({...f, w: true}));
      setLoading(l => ({...l, w: true}));
      scoreWithAI("writing", { task1: w1, task2: w2 }).then(res => {
        setWScore(res);
        setLoading(l => ({...l, w: false}));
      });
    }
    // Speaking
    const part1 = [0,1,2,3].map(i => sTranscripts[`p0q${i}`] || "").join(" | ");
    const part2 = sTranscripts["p1cue"] || "";
    const part3 = [0,1,2,3].map(i => sTranscripts[`p2q${i}`] || "").join(" | ");
    if (!fetched.s) {
      setFetched(f => ({...f, s: true}));
      setLoading(l => ({...l, s: true}));
      scoreWithAI("speaking", { part1, part2, part3 }).then(res => {
        setSScore(res);
        setLoading(l => ({...l, s: false}));
      });
    }
  }, []);

  const wBand = wScore ? roundToHalf(wScore.overall_band) : null;
  const sBand = sScore ? roundToHalf(sScore.band) : null;

  const canShowOverall = wBand !== null && sBand !== null;
  const overall = canShowOverall
    ? roundToHalf((lBand + rBand + wBand + sBand) / 4)
    : null;

  const bands = [
    { name: "Listening", val: lBand, sub: `${lCorrect}/${lQ.length} correct (scaled ${lScaled}/40)` },
    { name: "Reading", val: rBand, sub: `${rCorrect}/${rQ.length} correct (scaled ${rScaled}/40)` },
    { name: "Writing", val: wBand, sub: wScore ? `T1: ${wScore.task1_band} · T2: ${wScore.task2_band}` : "Scoring…" },
    { name: "Speaking", val: sBand, sub: sScore ? `Fluency: ${sScore.fluency_band} · Lex: ${sScore.lexical_band}` : "Scoring…" },
  ];

  return (
    <div className="results">
      <div className="results-header">
        <div style={{fontSize:12,letterSpacing:3,textTransform:"uppercase",color:"var(--gold)",marginBottom:12}}>Overall Band Score</div>
        {overall !== null ? (
          <>
            <div className="band-score">{overall.toFixed(1)}</div>
            <div className="band-label">{getBandDescriptor(overall)}</div>
          </>
        ) : (
          <div style={{padding:"20px 0"}}>
            <span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/>
            <div style={{fontSize:13,color:"var(--muted)",marginTop:12}}>AI is scoring your Writing & Speaking…</div>
          </div>
        )}
      </div>

      {/* Band Scores Grid */}
      <div className="score-grid">
        {bands.map(b => (
          <div className="score-cell" key={b.name}>
            <div className="score-cell-name">{b.name}</div>
            <div className="score-cell-val">{b.val !== null ? b.val.toFixed(1) : "—"}</div>
            <div className="score-cell-sub">{b.sub}</div>
            {b.val !== null && <div className="band-desc">{getBandDescriptor(b.val)}</div>}
          </div>
        ))}
      </div>

      {/* Band Bars */}
      <div className="band-bar-wrap">
        <h3>Band Score Breakdown</h3>
        {bands.map(b => (
          <div className="band-row" key={b.name}>
            <div className="band-row-label">{b.name}</div>
            <div className="band-bar-outer">
              <div className="band-bar-inner" style={{width: b.val !== null ? `${(b.val/9)*100}%` : "0%"}} />
            </div>
            <div className="band-row-val">{b.val !== null ? b.val.toFixed(1) : "…"}</div>
          </div>
        ))}
      </div>

      {/* AI Writing Feedback */}
      <div className="ai-feedback">
        <h3>✍️ Writing Feedback (AI Examiner)</h3>
        {loading.w ? (
          <div style={{textAlign:"center",padding:20}}><span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/><div style={{fontSize:13,color:"var(--muted)",marginTop:10}}>Analysing writing responses…</div></div>
        ) : wScore ? (
          <>
            <div className="feedback-card">
              <h4>Task 1 — Band {wScore.task1_band}</h4>
              <p>{wScore.task1_feedback}</p>
            </div>
            <div className="feedback-card">
              <h4>Task 2 — Band {wScore.task2_band}</h4>
              <p>{wScore.task2_feedback}</p>
            </div>
            <div className="feedback-card">
              <h4>Strengths</h4><p>{wScore.strengths}</p>
            </div>
            <div className="feedback-card">
              <h4>Key Improvement</h4><p>{wScore.improvements}</p>
            </div>
          </>
        ) : <p style={{color:"var(--muted)",fontSize:13}}>No writing submitted or scoring failed.</p>}

        <h3 style={{marginTop:28}}>🗣️ Speaking Feedback (AI Examiner)</h3>
        {loading.s ? (
          <div style={{textAlign:"center",padding:20}}><span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/><div style={{fontSize:13,color:"var(--muted)",marginTop:10}}>Analysing speaking transcripts…</div></div>
        ) : sScore ? (
          <>
            <div className="feedback-card">
              <h4>Overall Speaking — Band {sScore.band} · Fluency: {sScore.fluency_band} · Lexical: {sScore.lexical_band} · Grammar: {sScore.grammar_band}</h4>
              <p>{sScore.feedback}</p>
            </div>
            <div className="feedback-card"><h4>Strengths</h4><p>{sScore.strengths}</p></div>
            <div className="feedback-card"><h4>Key Improvement</h4><p>{sScore.improvements}</p></div>
          </>
        ) : <p style={{color:"var(--muted)",fontSize:13}}>No speaking responses submitted or scoring failed.</p>}
      </div>

      {/* Answer Key */}
      <div className="answer-key">
        <h3>Answer Key — Listening & Reading</h3>
        {[...lQ, ...rQ].map(q => {
          const ans = q.id.startsWith("l") ? lAnswers[q.id] : rAnswers[q.id];
          const isCorrect = q.type==="mcq" ? ans===q.answer : (ans||"").toLowerCase().trim()===q.answer.toLowerCase();
          const display = q.type==="mcq" ? (ans!==undefined ? `${String.fromCharCode(65+ans)}. ${q.options[ans]}` : "Not answered") : (ans||"Not answered");
          const correct = q.type==="mcq" ? `${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}` : q.answer;
          return (
            <div className="answer-item" key={q.id}>
              <span className="ans-q">Q{q.num}</span>
              <span className={`ans-yours ${isCorrect?"ans-correct-mark":"ans-wrong-mark"}`}>{isCorrect?"✓":"✗"} {display}</span>
              {!isCorrect && <span className="correct-ans">→ {correct}</span>}
            </div>
          );
        })}
      </div>

      <div className="actions" style={{justifyContent:"center"}}>
        <button className="btn btn-primary" onClick={onRetake}>Retake Test</button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const SECTIONS = ["listening","reading","writing","speaking"];
const DURATIONS = { listening:30*60, reading:60*60, writing:60*60, speaking:15*60 };

function IELTSTest() {
  const [active, setActive] = useState("listening");
  const [submitted, setSubmitted] = useState({});
  const [lAns, setLAns] = useState({});
  const [rAns, setRAns] = useState({});
  const [wAns, setWAns] = useState({});
  const [sTranscripts, setSTranscripts] = useState({});
  const [timers, setTimers] = useState({...DURATIONS});
  const [showResults, setShowResults] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    if (submitted[active]) return;
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setTimers(t => ({...t, [active]: Math.max(0, t[active]-1)}));
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [active, submitted]);

  const handleSubmit = (s) => { clearInterval(timerRef.current); setSubmitted(p => ({...p, [s]:true})); };
  const allDone = SECTIONS.every(s => submitted[s]);
  const progress = SECTIONS.filter(s => submitted[s]).length / SECTIONS.length * 100;

  const retake = () => {
    setActive("listening"); setSubmitted({}); setLAns({}); setRAns({}); setWAns({}); setSTranscripts({});
    setTimers({...DURATIONS}); setShowResults(false);
  };

  return (
    <>
      <style>{style}</style>
      <div className="app">
        <div className="header">
          <div className="header-label">Full Mock Examination</div>
          <h1>IELTS Academic Practice Test</h1>
          <div className="header-meta">
            <span>Format: <strong>Academic</strong></span>
            <span>Total: <strong>2 hrs 44 min</strong></span>
            <span>+ Transfer: <strong>10 min</strong></span>
            <span>Scoring: <strong>Official Band 0–9</strong></span>
          </div>
        </div>

        {!showResults ? (
          <>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}} /></div>
            <div className="tabs">
              {SECTIONS.map(s => (
                <button key={s} className={`tab ${active===s?"active":""} ${submitted[s]?"done":""}`} onClick={() => setActive(s)}>
                  {submitted[s]?"✓ ":""}{s.charAt(0).toUpperCase()+s.slice(1)}
                  <br/><span style={{fontSize:10,opacity:0.7}}>{s==="listening"?"30 min":s==="reading"?"60 min":s==="writing"?"60 min":"15 min"}</span>
                </button>
              ))}
            </div>

            {active==="listening" && <ListeningSection answers={lAns} onAnswer={(id,v)=>setLAns(a=>({...a,[id]:v}))} submitted={!!submitted.listening} onSubmit={()=>handleSubmit("listening")} timerSec={timers.listening} />}
            {active==="reading" && <ReadingSection answers={rAns} onAnswer={(id,v)=>setRAns(a=>({...a,[id]:v}))} submitted={!!submitted.reading} onSubmit={()=>handleSubmit("reading")} timerSec={timers.reading} />}
            {active==="writing" && <WritingSection answers={wAns} onAnswer={(id,v)=>setWAns(a=>({...a,[id]:v}))} submitted={!!submitted.writing} onSubmit={()=>handleSubmit("writing")} timerSec={timers.writing} />}
            {active==="speaking" && <SpeakingSection transcripts={sTranscripts} onTranscript={(k,v)=>setSTranscripts(t=>({...t,[k]:v}))} submitted={!!submitted.speaking} onSubmit={()=>handleSubmit("speaking")} timerSec={timers.speaking} />}

            {allDone && (
              <div style={{textAlign:"center",marginTop:28}}>
                <button className="btn btn-primary" style={{fontSize:16,padding:"14px 48px"}} onClick={()=>setShowResults(true)}>
                  View Band Scores & AI Feedback
                </button>
              </div>
            )}
          </>
        ) : (
          <Results lAnswers={lAns} rAnswers={rAns} wAnswers={wAns} sTranscripts={sTranscripts} onRetake={retake} />
        )}

        <div style={{textAlign:"center",marginTop:36,paddingTop:24,borderTop:"1px solid var(--border)",fontSize:12,color:"var(--muted)"}}>
          Practice test only. Official IELTS is administered by British Council, IDP & Cambridge Assessment English.
        </div>
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<IELTSTest />);
  </script>
</body>
</html>
